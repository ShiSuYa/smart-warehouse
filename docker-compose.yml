services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: warehouse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: warehouse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: warehouse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_KAFKASTORE_TIMEOUT_MS: 10000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: warehouse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic warehouse-events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic warehouse-events-dlq --partitions 3 --replication-factor 1
      "

  cassandra-1:
    image: cassandra:4.1
    container_name: cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 30

  cassandra-2:
    image: cassandra:4.1
    container_name: cassandra-2
    ports:
      - "9043:9042"
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 30

  cassandra-3:
    image: cassandra:4.1
    container_name: cassandra-3
    ports:
      - "9044:9042"
    depends_on:
      cassandra-2:
        condition: service_healthy
    environment:
      CASSANDRA_CLUSTER_NAME: WarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 30

  cassandra-init:
    image: cassandra:4.1
    container_name: warehouse-cassandra-init
    depends_on:
      cassandra-1:
        condition: service_healthy
      cassandra-2:
        condition: service_healthy
      cassandra-3:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql
    command: >
      sh -c "cqlsh cassandra-1 -f /init.cql"

  consumer:
    build:
      context: ./consumer
    container_name: warehouse-consumer
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: warehouse-events
      KAFKA_GROUP_ID: warehouse-state-consumer
      DLQ_TOPIC: warehouse-events-dlq
      CASSANDRA_HOSTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_KEYSPACE: warehouse
      METRICS_PORT: 8000
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: warehouse-prometheus
    depends_on:
      - consumer
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.2.0
    container_name: warehouse-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards